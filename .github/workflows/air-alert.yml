name: air-alert

on:
  schedule:
    # GitHub Actions 무료 cron 지연(최대 15-20분)을 감안해 20분 앞당김
    - cron: '00 22 * * 0-4'   # 월-금 07:00 KST (UTC 전날 22:00)
    - cron: '00 1 * * 1-5'    # 월-금 10:00 KST (UTC 01:00)
    - cron: '30 7 * * 1-5'    # 월-금 16:30 KST (UTC 07:30)
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '8'
          cache: maven

      - name: Run air-alert
        env:
          AIRKOREA_SERVICE_KEY: ${{ secrets.AIRKOREA_SERVICE_KEY }}
          AIRKOREA_STATION_NAME: ${{ secrets.AIRKOREA_STATION_NAME }}
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
        run: mvn -B -q compile exec:java
